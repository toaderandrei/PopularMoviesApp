name: PopularMovies
options:
  bundleIdPrefix: com.ant
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  PopularMovies:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - iosApp
    dependencies:
      - framework: ../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ant.popularmovies
        INFOPLIST_FILE: iosApp/Info.plist
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_ASSET_PATHS: "\"iosApp/Preview Content\""
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        FRAMEWORK_SEARCH_PATHS: "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS: "-framework Shared"
    preBuildScripts:
      - name: Build Kotlin Framework
        script: |
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
            echo "Skipping Gradle build task invocation"
            exit 0
          fi
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
