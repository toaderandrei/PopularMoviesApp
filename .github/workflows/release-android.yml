name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.3)'
        required: true
        type: string

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-artifacts:
    name: Check for today's signed artifacts
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.check.outputs.found }}
    steps:
      - name: Check for existing artifacts from today
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Looking for release-artifacts from today ($TODAY) in Master workflow..."

          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/build-main.yml/runs?status=success&per_page=5" \
            --jq ".workflow_runs[] | select(.created_at | startswith(\"$TODAY\")) | .id" | head -1)

          if [ -n "$RUN_ID" ]; then
            ARTIFACT=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "release-artifacts") | .id')
            if [ -n "$ARTIFACT" ]; then
              echo "Found today's release-artifacts (run: $RUN_ID, artifact: $ARTIFACT)"
              echo "found=true" >> "$GITHUB_OUTPUT"
            else
              echo "No release-artifacts in today's run"
              echo "found=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No successful Master workflow run found for today"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build from scratch
    needs: check-artifacts
    if: needs.check-artifacts.outputs.found != 'true'
    uses: ./.github/workflows/build-android.yml
    with:
      build-type: release
    secrets: inherit

  release:
    name: Create GitHub Release
    needs: [check-artifacts, build]
    if: always() && (needs.check-artifacts.outputs.found == 'true' || needs.build.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from today's main build
        if: needs.check-artifacts.outputs.found == 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-main.yml
          name: release-artifacts
          path: artifacts
          search_artifacts: true
          if_no_artifact_found: fail
          check_artifacts: true

      - name: Download artifacts from fresh build
        if: needs.check-artifacts.outputs.found != 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "android-v${{ inputs.version }}"
          name: "Android v${{ inputs.version }}"
          body: |
            Android Release v${{ inputs.version }}

            Download the APK below to install.
          artifacts: "artifacts/**/*.apk,artifacts/**/*.aab"
          draft: false
          prerelease: true
