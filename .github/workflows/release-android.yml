name: Android Release (Gradle)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.3)'
        required: true
        type: string

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

jobs:
  build-android:
    name: Build Android App via Gradle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Build Release APK
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PversionName=${{ inputs.version }}

      # Upload artifacts
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-${{ inputs.version }}
          path: app/build/outputs/apk/release/*.apk

      # Create GitHub release
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "android-v${{ inputs.version }}"
          name: "Android v${{ inputs.version }}"
          body: |
            Android Release v${{ inputs.version }}

            Download the APK below to install.
          artifacts: "app/build/outputs/apk/release/*.apk"
          draft: false
          prerelease: true