name: iOS Release (Gradle)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.3)'
        required: true
        type: string
      buildNumber:
        description: 'Build number (e.g. 100)'
        required: false
        type: string
        default: '1'

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

jobs:
  build-ios:
    name: Build iOS App via Gradle
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Install CocoaPods if needed
      - name: Setup CocoaPods
        run: |
          if [ -f "iosApp/Podfile" ]; then
            echo "Installing CocoaPods..."
            gem install cocoapods --user-install
            echo "$(ruby -e 'puts Gem.user_dir')/bin" >> $GITHUB_PATH
          else
            echo "No Podfile found, skipping CocoaPods installation"
          fi

      # Single Gradle command to build everything
      - name: Build iOS Release
        run: |
          ./gradlew iosRelease \
            -Pversion=${{ inputs.version }} \
            -PbuildNumber=${{ inputs.buildNumber }} \
            -PiosConfiguration=Release \
            -PiosSigned=false

      # Upload artifacts
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ inputs.version }}
          path: iosApp/build/IPA/*.ipa

      # Create GitHub release
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "ios-v${{ inputs.version }}"
          name: "iOS v${{ inputs.version }}"
          body: |
            iOS Release v${{ inputs.version }}

            **Build Number:** ${{ inputs.buildNumber }}

            **Note:** This is an unsigned build. To install:
            - Use AltStore or Sideloadly for sideloading
            - Or re-sign with your Apple Developer account
          artifacts: "iosApp/build/IPA/*.ipa"
          draft: false
          prerelease: true