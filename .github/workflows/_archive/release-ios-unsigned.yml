name: iOS Release (Unsigned)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.3)'
        required: true
        type: string
      build_number:
        description: 'Build number (e.g. 100)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

jobs:
  build-framework:
    name: Build KMP Framework
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Cache Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Build iOS Frameworks
        run: |
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode \
            -Pconfiguration.build.type=release \
            -PversionName=${{ inputs.version }} \
            -PversionCode=${{ inputs.build_number }}

      - name: Upload Framework Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-frameworks
          path: |
            shared/build/outputs/framework/

  build-ios-app:
    name: Build iOS App (Unsigned)
    needs: build-framework
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Framework Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-frameworks
          path: shared/build/outputs/framework/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: iosApp

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: latest

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: iosApp/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods dependencies
        working-directory: iosApp
        run: |
          pod install --repo-update

      - name: Setup XcodeGen (if needed)
        if: hashFiles('iosApp/project.yml') != ''
        run: brew install xcodegen

      - name: Generate Xcode project (if needed)
        if: hashFiles('iosApp/project.yml') != ''
        working-directory: iosApp
        run: xcodegen generate

      - name: Update Version and Build Number
        working-directory: iosApp
        run: |
          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" iosApp/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ inputs.build_number }}" iosApp/Info.plist

      - name: Build iOS App for Simulator
        working-directory: iosApp
        run: |
          xcodebuild clean build \
            -workspace PopularMovies.xcworkspace \
            -scheme PopularMovies \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build/DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty

      - name: Build iOS App Archive (Unsigned)
        working-directory: iosApp
        run: |
          # Build for device without code signing
          xcodebuild archive \
            -workspace PopularMovies.xcworkspace \
            -scheme PopularMovies \
            -configuration Release \
            -archivePath build/PopularMovies.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Create Unsigned IPA
        working-directory: iosApp
        run: |
          # Create Payload directory
          mkdir -p build/Payload

          # Copy app to Payload
          cp -R build/PopularMovies.xcarchive/Products/Applications/PopularMovies.app build/Payload/

          # Create IPA
          cd build
          zip -r PopularMovies-unsigned.ipa Payload

          echo "✓ Created unsigned IPA: build/PopularMovies-unsigned.ipa"
          echo "Note: This IPA is unsigned and can only be installed on jailbroken devices or simulators"

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-${{ inputs.version }}
          path: |
            iosApp/build/DerivedData/Build/Products/Release-iphonesimulator/*.app

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-${{ inputs.version }}
          path: |
            iosApp/build/PopularMovies-unsigned.ipa

  create-github-release:
    name: Create GitHub Release
    needs: [build-ios-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download iOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-${{ inputs.version }}
          path: release-artifacts

      - name: Create Release Tag
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git tag "ios-v${{ inputs.version }}-unsigned"
          git push origin "ios-v${{ inputs.version }}-unsigned"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "ios-v${{ inputs.version }}-unsigned"
          name: "iOS Release v${{ inputs.version }} (Unsigned)"
          body: |
            ## iOS Release v${{ inputs.version }} (Unsigned)

            Build Number: ${{ inputs.build_number }}

            ### ⚠️ Important Notes
            This is an **unsigned** build for development and testing purposes only.

            **Installation Options:**
            - **Simulator**: Use the simulator build with Xcode
            - **Physical Device**: Requires either:
              - Re-signing with your own certificates
              - Jailbroken device
              - Using tools like AltStore or Sideloadly

            ### What's Changed
            - See commit history for changes

            ### How to Install on Simulator
            1. Download the simulator app
            2. Drag and drop onto running iOS Simulator

            ### How to Install on Device (Re-signing Required)
            1. Download the unsigned IPA
            2. Use tools like:
               - AltStore (https://altstore.io)
               - Sideloadly (https://sideloadly.io)
               - Xcode (re-sign with your Apple ID)

            ### Files
            - `PopularMovies-unsigned.ipa` - Unsigned IPA for devices (requires re-signing)
          artifacts: "release-artifacts/**/*.ipa"
          draft: false
          prerelease: true