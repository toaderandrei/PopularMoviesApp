name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.3)'
        required: true
        type: string
      version_code:
        description: 'Version code (e.g. 100)'
        required: true
        type: string
      deploy_playstore:
        description: 'Deploy to Play Store'
        required: false
        type: boolean
        default: false
      track:
        description: 'Play Store track'
        required: false
        type: choice
        default: 'internal'
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
  ANDROID_SDK_ROOT: /opt/android-sdk

jobs:
  validate-and-test:
    name: Validate and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $GOOGLE_SERVICES_JSON | base64 -di > app/google-services.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Lint
        run: ./gradlew lint

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results*.html

  build-release:
    name: Build Release APK and AAB
    needs: validate-and-test
    runs-on: ubuntu-latest
    env:
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $GOOGLE_SERVICES_JSON | base64 -di > app/google-services.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          mkdir -p $HOME/.android
          echo "$SIGNING_KEY_BASE64" | base64 -d > $HOME/.android/release.keystore

      - name: Update Version
        run: |
          # Update version in gradle/libs.versions.toml or build.gradle
          sed -i "s/versionName = \".*\"/versionName = \"${{ inputs.version }}\"/" gradle/libs.versions.toml
          sed -i "s/versionCode = \".*\"/versionCode = \"${{ inputs.version_code }}\"/" gradle/libs.versions.toml

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PversionName=${{ inputs.version }} \
            -PversionCode=${{ inputs.version_code }}

      - name: Build Release Bundle (AAB)
        run: |
          ./gradlew bundleRelease \
            -PversionName=${{ inputs.version }} \
            -PversionCode=${{ inputs.version_code }}

      - name: Verify APK Signature
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No release APK found"
            exit 1
          fi
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)
          $APKSIGNER verify --print-certs "$APK" || {
            echo "ERROR: Release APK is NOT signed!"
            exit 1
          }
          echo "✓ APK is properly signed: $APK"

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Version ${{ inputs.version }} (Build ${{ inputs.version_code }})" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### What's New" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" HEAD~10..HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ inputs.version }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ inputs.version }}
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload Mapping Files
        uses: actions/upload-artifact@v4
        with:
          name: mapping-files-${{ inputs.version }}
          path: |
            app/build/outputs/mapping/release/

  deploy-playstore:
    name: Deploy to Play Store
    if: ${{ inputs.deploy_playstore }}
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab-${{ inputs.version }}
          path: release

      - name: Download Mapping Files
        uses: actions/download-artifact@v4
        with:
          name: mapping-files-${{ inputs.version }}
          path: mapping

      - name: Setup Google Play Credentials
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT" > service-account.json

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: com.ant.popular_movies_kt  # Update with your package name
          releaseFiles: release/*.aab
          track: ${{ inputs.track }}
          status: draft  # Can be: draft, completed, halted
          inAppUpdatePriority: 2
          mappingFile: mapping/mapping.txt
          debugSymbols: mapping/
          whatsNewDirectory: whatsnew/  # Optional: directory with release notes

  create-github-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ inputs.version }}
          path: release-artifacts

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab-${{ inputs.version }}
          path: release-artifacts

      - name: Create Release Tag
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git tag "android-v${{ inputs.version }}"
          git push origin "android-v${{ inputs.version }}"

      - name: Generate Changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Android Release v${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Version Code: ${{ inputs.version_code }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### What's Changed" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~20)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "- **Play Store**: ${{ inputs.deploy_playstore && 'Deployed to' || 'Not deployed to' }} ${{ inputs.track || 'N/A' }} track" >> $GITHUB_OUTPUT
          echo "- **Direct APK**: Download from release assets below" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "android-v${{ inputs.version }}"
          name: "Android Release v${{ inputs.version }}"
          body: ${{ steps.changelog.outputs.changelog }}
          artifacts: "release-artifacts/**/*.apk,release-artifacts/**/*.aab"
          draft: false
          prerelease: ${{ inputs.track != 'production' }}

  notify-completion:
    name: Notify Completion
    if: always()
    needs: [validate-and-test, build-release, deploy-playstore, create-github-release]
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.build-release.result }}" == "success" ]; then
            echo "✅ Android Release v${{ inputs.version }} completed successfully!"
            if [ "${{ inputs.deploy_playstore }}" == "true" ]; then
              echo "📱 Deployed to Play Store (${{ inputs.track }} track)"
            fi
          else
            echo "❌ Android Release v${{ inputs.version }} failed"
            exit 1
          fi