name: iOS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.3)'
        required: true
        type: string

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Build KMP Framework
      - name: Build KMP Framework
        run: |
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode -Pconfiguration.build.type=release
          ./gradlew :shared-ui:embedAndSignAppleFrameworkForXcode -Pconfiguration.build.type=release

      # Setup CocoaPods
      - name: Setup CocoaPods
        run: |
          cd iosApp
          gem install cocoapods
          pod install --repo-update

      # Build iOS App
      - name: Build iOS App
        run: |
          cd iosApp

          # Update version
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" iosApp/Info.plist || true

          # Build for device (unsigned - for now)
          xcodebuild archive \
            -workspace PopularMovies.xcworkspace \
            -scheme PopularMovies \
            -configuration Release \
            -archivePath build/PopularMovies.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # Create unsigned IPA
          mkdir -p build/Payload
          cp -R build/PopularMovies.xcarchive/Products/Applications/PopularMovies.app build/Payload/
          cd build
          zip -r PopularMovies.ipa Payload

      # Upload artifacts
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ inputs.version }}
          path: iosApp/build/PopularMovies.ipa

      # Create release
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "ios-v${{ inputs.version }}"
          name: "iOS v${{ inputs.version }}"
          body: |
            iOS Release v${{ inputs.version }}

            **Note:** This is an unsigned build. To install:
            - Use a tool like AltStore or Sideloadly
            - Or re-sign with your Apple Developer account
          artifacts: "iosApp/build/PopularMovies.ipa"
          draft: false
          prerelease: true