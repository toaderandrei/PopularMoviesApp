name: Build Android

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Build type: debug or release'
        required: true
        type: string

jobs:
  buildAndroid:
    runs-on: ubuntu-latest
    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      ANDROID_SDK_ROOT: /opt/android-sdk
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $GOOGLE_SERVICES_JSON | base64 -di > app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /opt/android-sdk
          key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble Debug
        if: inputs.build-type == 'debug'
        run: ./gradlew assembleDebug --stacktrace

      - name: Decode Keystore
        if: inputs.build-type == 'release'
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          mkdir -p $HOME/.android
          chmod +x $HOME/.android
          echo "$SIGNING_KEY_BASE64" | base64 -d > $HOME/.android/release.keystore

      - name: Build Release APK
        if: inputs.build-type == 'release'
        run: ./gradlew assembleRelease --stacktrace

      - name: Build Release Bundle
        if: inputs.build-type == 'release'
        run: ./gradlew bundleRelease --stacktrace

      - name: Verify APK is signed
        if: inputs.build-type == 'release'
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No release APK found"
            exit 1
          fi
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)
          $APKSIGNER verify --print-certs "$APK" || {
            echo "ERROR: Release APK is NOT signed!"
            exit 1
          }
          echo "APK is properly signed: $APK"

      - name: Upload Release Build to Artifacts
        if: inputs.build-type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
